<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: 'Segoe UI', 'Tahoma', 'Amiri', system-ui, sans-serif;
    background-color: #0a0a0a;
    color: #d4d4d4;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 20px;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at center, #1a1a1a 0%, #000000 100%);
    z-index: -2;
  }

  .tribute-container {
    max-width: 550px;
    width: 100%;
    background: rgba(20, 20, 20, 0.75);
    backdrop-filter: blur(8px);
    border-radius: 48px;
    padding: 30px 24px 40px;
    text-align: center;
    box-shadow: 0 25px 45px rgba(0,0,0,0.5), 0 0 0 1px rgba(139,0,0,0.2);
    border: 1px solid rgba(139,0,0,0.3);
  }

  .tribute-text {
    font-size: 1.4rem;
    line-height: 1.8;
    margin-bottom: 30px;
    font-weight: 500;
  }
  .tribute-text strong {
    color: #b33;
    font-weight: 700;
    display: block;
    margin-bottom: 20px;
    font-size: 1.6rem;
    letter-spacing: -0.5px;
  }

  .closure-message {
    background: rgba(0,0,0,0.4);
    padding: 16px;
    border-radius: 32px;
    margin: 20px 0;
    font-size: 1.1rem;
    border-right: 3px solid #8B0000;
  }

  .date-badge {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: #1f1f1f;
    padding: 8px 18px;
    border-radius: 40px;
    font-size: 0.9rem;
    color: #aaa;
    margin-top: 10px;
  }
  .date-badge i {
    color: #8B0000;
  }

  .social-footer {
    margin-top: 35px;
    display: flex;
    justify-content: center;
    gap: 28px;
    flex-wrap: wrap;
  }
  .social-footer a {
    color: #aaa;
    font-size: 1.8rem;
    transition: all 0.2s ease;
    background: #1c1c1c;
    width: 52px;
    height: 52px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    text-decoration: none;
    border: 1px solid #333;
  }
  .social-footer a:hover {
    color: #fff;
    background: #8B0000;
    transform: translateY(-4px);
    border-color: #8B0000;
  }

  .copyright {
    text-align: center;
    font-size: 0.7rem;
    color: #555;
    margin-top: 25px;
  }

  .dark-toggle {
    position: fixed;
    top: 16px;
    left: 16px;
    background: #222;
    border: none;
    color: #ddd;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    font-size: 1.3rem;
    cursor: pointer;
    z-index: 100;
    backdrop-filter: blur(5px);
    transition: 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .dark-toggle:hover {
    background: #8B0000;
    color: white;
  }

  body.light-mode {
    background-color: #e8e8e8;
  }
  body.light-mode::before {
    background: radial-gradient(circle at center, #f0f0f0 0%, #d0d0d0 100%);
  }
  body.light-mode .tribute-container {
    background: rgba(245, 245, 245, 0.9);
    color: #2c2c2c;
    border-color: rgba(180, 0, 0, 0.4);
  }
  body.light-mode .closure-message {
    background: rgba(0,0,0,0.05);
    color: #333;
  }
  body.light-mode .date-badge {
    background: #e0e0e0;
    color: #444;
  }
  body.light-mode .social-footer a {
    background: #f0f0f0;
    color: #444;
  }
  body.light-mode .social-footer a:hover {
    background: #8B0000;
    color: white;
  }

  @media (max-width: 550px) {
    body {
      padding: 16px;
    }
    .tribute-container {
      padding: 24px 18px 32px;
    }
    .tribute-text {
      font-size: 1.1rem;
    }
    .tribute-text strong {
      font-size: 1.3rem;
    }
    .closure-message {
      font-size: 1rem;
      padding: 12px;
    }
    .social-footer a {
      width: 48px;
      height: 48px;
      font-size: 1.5rem;
    }
    .dark-toggle {
      width: 38px;
      height: 38px;
      font-size: 1rem;
      top: 12px;
      left: 12px;
    }
  }
</style>

<body>
<button class="dark-toggle" id="themeToggle" aria-label="تبديل الوضع"><i class="fas fa-sun"></i></button>

<div class="tribute-container">
  <div class="tribute-text">
    <strong>أعظم الله أجورنا وأجوركم<br>بمصاب أبي عبد الله الحسين عليه السلام</strong>
  </div>
  <div class="closure-message">
    <i class="fas fa-store-slash" style="margin-left: 8px; color:#8B0000;"></i>
    زبائننا الكرام، المتجر متوقف مؤقتاً<br>
    إلى بعد يوم <strong>13 من شهر محرم الحرام</strong>
  </div>
  <div class="date-badge">
    <i class="fas fa-calendar-alt"></i> 1 - 13 محرم الحرام 1448 هـ
    <i class="fas fa-heart-broken" style="margin-right: 6px;"></i>
  </div>
  <div class="social-footer">
    <a href="https://wa.me/9647766142936" target="_blank" title="واتساب"><i class="fab fa-whatsapp"></i></a>
    <a href="https://t.me/jaiq19" target="_blank" title="تليجرام"><i class="fab fa-telegram"></i></a>
    <a href="https://www.instagram.com/jaiq19_/" target="_blank" title="انستقرام"><i class="fab fa-instagram"></i></a>
    <a href="https://www.facebook.com/profile.php?id=61573593535175" target="_blank" title="فيسبوك"><i class="fab fa-facebook-f"></i></a>
  </div>
  <div class="copyright">
    <i class="fas fa-hussar"></i> شكراً لثقتكم بنا | متجر جود العباس
  </div>
</div>

<script>
  const toggleBtn = document.getElementById('themeToggle');
  const icon = toggleBtn.querySelector('i');
  
  function setTheme(isDark) {
    if(isDark) {
      document.body.classList.remove('light-mode');
      icon.className = 'fas fa-sun';
    } else {
      document.body.classList.add('light-mode');
      icon.className = 'fas fa-moon';
    }
  }
  
  const savedTheme = localStorage.getItem('tributeTheme');
  if(savedTheme === 'light') {
    setTheme(false);
  } else {
    setTheme(true);
  }
  
  toggleBtn.addEventListener('click', () => {
    const isDark = !document.body.classList.contains('light-mode');
    if(isDark) {
      setTheme(false);
      localStorage.setItem('tributeTheme', 'light');
    } else {
      setTheme(true);
      localStorage.setItem('tributeTheme', 'dark');
    }
  });
</script>
</body>
